# =============================================================================
# Tokyo Night Abyss Theme for tmux
# Palette derived from starship.toml.tmpl § palettes.tokyo-night-abyss
# =============================================================================

# Tokyo Night Abyss Colors
# Background:    #0D0E15
# Foreground:    #9AA3C4
# Blue:          #5278C4
# Cyan:          #5099C4
# Teal:          #4EA596
# Red:           #C4546E
# Orange:        #C97A4A
# Green:         #729947
# Yellow:        #A87F4A
# Purple:        #8E6DC4
# Off-black 1:   #1A1B26  (subtle border, dim divider)
# Off-black 2:   #2A2D44  (focused border, gray slot)

# -----------------------------------------------------------------------------
# Status Bar General
# -----------------------------------------------------------------------------

set -g status-style "bg=#0D0E15,fg=#9AA3C4"

set -g status-left-length 50
set -g status-right-length 150

# -----------------------------------------------------------------------------
# Status Left - Session Name
# -----------------------------------------------------------------------------

set -g status-left "#[bg=#5278C4,fg=#0D0E15,bold] #S #[bg=#0D0E15,fg=#5278C4]"

# -----------------------------------------------------------------------------
# Window Status - Tab-like Appearance
# -----------------------------------------------------------------------------

setw -g window-status-separator ""

# Inactive windows
setw -g window-status-format "#[bg=#16161E,fg=#0D0E15]#[bg=#16161E,fg=#3A3F59] #I #W #[bg=#0D0E15,fg=#16161E]"

# Active window — purple accent for Tokyo Night identity
setw -g window-status-current-format "#[bg=#8E6DC4,fg=#0D0E15]#[bg=#8E6DC4,fg=#0D0E15,bold] #I #W #[bg=#0D0E15,fg=#8E6DC4]"

setw -g window-status-activity-style "none"

# -----------------------------------------------------------------------------
# Status Right - Clock and Host
# -----------------------------------------------------------------------------

set -g status-right "#(tmux-nexus-creds)  #[bg=#0D0E15,fg=#16161E]#[bg=#16161E,fg=#3A3F59] %H:%M #[bg=#16161E,fg=#5278C4]#[bg=#5278C4,fg=#0D0E15,bold] #h "

# -----------------------------------------------------------------------------
# Pane Borders — thin off-black
# -----------------------------------------------------------------------------

# Use single-line box-drawing for thin border characters
set -g pane-border-lines single

# Off-black for both states; active is a touch brighter so focus is still readable
set -g pane-border-style "fg=#1A1B26"
set -g pane-active-border-style "fg=#2A2D44"

# -----------------------------------------------------------------------------
# Message/Command Line
# -----------------------------------------------------------------------------

set -g message-style "bg=#5278C4,fg=#0D0E15,bold"
set -g message-command-style "bg=#5278C4,fg=#0D0E15"

# -----------------------------------------------------------------------------
# Mode (copy mode, etc.)
# -----------------------------------------------------------------------------

setw -g mode-style "bg=#5278C4,fg=#0D0E15"

# -----------------------------------------------------------------------------
# Clock
# -----------------------------------------------------------------------------

setw -g clock-mode-colour "#5278C4"

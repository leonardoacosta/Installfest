# proxychains-ng configuration
# Routes TCP traffic through CloudPC SOCKS5 tunnel
# UDP goes direct (no latency penalty for calls/video)

# Quiet mode — no output from proxychains itself
quiet_mode

# Proxy DNS requests through the proxy (prevents DNS leaks)
proxy_dns

# Timeout settings
tcp_read_time_out 15000
tcp_connect_time_out 8000

[ProxyList]
socks5 127.0.0.1 1080
